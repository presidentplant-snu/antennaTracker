# Antenna Tracker Configuration

# Serial port for servo controller
serial_port: "/dev/ttyUSB0"

# Ground station location
ground_station:
  latitude: 47.397973   # degrees
  longitude: 8.546313   # degrees
  altitude: 0.0         # meters MSL
  heading: 0.0          # degrees (0 = North, 90 = East, 180 = South, 270 = West)

# Pitch servo (tilt/elevation)
pitch_servo:
  trim_pwm: 1550
  min_pwm: 1550
  max_pwm: 2300
  min_angle: 0.0
  max_angle: 90.0
  max_rate: 5

# Yaw servo (pan/azimuth)
yaw_servo:
  trim_pwm: 1430
  min_pwm: 1000
  max_pwm: 1800
  min_angle: -90.0
  max_angle: 90.0
  max_rate: 5
